<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fbd84a 0%, #f9a826 100%);
            min-height: 100vh;
            padding: 15px;
            color: #5c3a21;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 2.2em;
            color: #ffffff;
            -webkit-text-stroke: 1.5px #5c3a21;
            text-shadow: 4px 4px 0px rgba(92, 58, 33, 0.15);
            letter-spacing: 2px;
            margin-bottom: 10px;
            transform: rotate(-2deg);
            display: inline-block;
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .header p {
            font-size: 0.95em;
            color: #5c3a21;
            background: #ffffff;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 25px;
            border: 2.5px solid #5c3a21;
            box-shadow: 3px 3px 0px rgba(92, 58, 33, 0.1);
            transform: rotate(1deg);
        }

        .card {
            background: #fffdf7;
            border-radius: 18px;
            padding: 24px;
            border: 3px solid #5c3a21;
            box-shadow: 6px 6px 0px rgba(92, 58, 33, 0.15);
            margin-bottom: 20px;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%) rotate(-2deg);
            width: 110px;
            height: 32px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 248, 248, 0.85) 100%);
            border: 2.5px solid #5c3a21;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
            z-index: 2;
            opacity: 0.95;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: inline-block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #5c3a21;
            font-size: 0.95em;
            background: linear-gradient(135deg, #b2ebf2 0%, #80deea 100%);
            padding: 4px 12px;
            border-radius: 10px;
            border: 2px solid #5c3a21;
            transform: rotate(-1deg);
            box-shadow: 2px 2px 0px rgba(92, 58, 33, 0.1);
        }

        .input-wrapper {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2.5px solid #dbcfb4;
            border-radius: 12px;
            font-size: 0.95em;
            transition: all 0.2s ease;
            background: #ffffff;
            color: #5c3a21;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.04);
        }

        .input-group input:focus {
            outline: none;
            border-color: #f9a826;
            box-shadow: 0 0 0 3px rgba(249, 168, 38, 0.25), inset 0 1px 3px rgba(0,0,0,0.04);
        }

        .input-group input::placeholder {
            color: #bcaaa4;
        }

        .slider-container {
            margin-top: 8px;
            padding: 0 4px;
        }

        .slider-value {
            text-align: center;
            font-size: 0.85em;
            color: #5c3a21;
            margin-bottom: 4px;
            font-weight: 500;
            background: #fff9c4;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid #5c3a21;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: linear-gradient(to right, #fff9c4, #f9a826);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            border: 2px solid #5c3a21;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: #ff6b6b;
            border: 3px solid #5c3a21;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: #ff6b6b;
            border: 3px solid #5c3a21;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .btn-predict {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #8bc34a 0%, #7cb342 100%);
            color: #ffffff;
            border: 3px solid #33691e;
            border-radius: 16px;
            font-size: 1.15em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            margin-top: 12px;
            box-shadow: 0 6px 0px #33691e, 0 10px 15px rgba(0,0,0,0.15);
            text-shadow: 1px 1px 0px #33691e;
        }

        .btn-predict:hover {
            transform: translateY(2px);
            box-shadow: 0 4px 0px #33691e, 0 8px 12px rgba(0,0,0,0.15);
            background: linear-gradient(135deg, #9ccc65 0%, #8bc34a 100%);
        }

        .btn-predict:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #33691e;
        }

        .result {
            display: none;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result.show {
            display: block;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.92) translateY(15px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .result-header {
            text-align: center;
            margin-bottom: 18px;
            padding: 12px 20px;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: #ffffff;
            border-radius: 14px;
            font-size: 1.05em;
            border: 2.5px solid #5c3a21;
            box-shadow: 3px 3px 0px rgba(92, 58, 33, 0.15);
            text-shadow: 1px 1px 0px #5c3a21;
            transform: rotate(1deg);
            font-weight: 600;
        }

        .result-content {
            display: grid;
            gap: 14px;
        }

        .result-item {
            padding: 14px;
            background: #ffffff;
            border-radius: 14px;
            border: 2.5px solid #5c3a21;
            box-shadow: 3px 3px 0px rgba(92, 58, 33, 0.12);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .result-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 100%;
            background: linear-gradient(135deg, #ff7043 0%, #ff5722 100%);
            border-right: 2.5px solid #5c3a21;
        }

        .result-item:hover {
            transform: translateY(-3px) rotate(-0.5deg);
            box-shadow: 5px 5px 0px rgba(92, 58, 33, 0.18);
        }

        .creature-img {
            width: 75px;
            max-width: 75px;
            min-height: 75px;
            border-radius: 10px;
            object-fit: contain;
            border: 2px solid #5c3a21;
            background: #fff9c4;
            margin-left: 8px;
            box-shadow: 2px 2px 0px rgba(92, 58, 33, 0.1);
        }

        .creature-details {
            flex: 1;
        }

        .result-item .name {
            font-size: 1.15em;
            color: #5c3a21;
            margin-bottom: 10px;
            padding-left: 0;
            display: inline-block;
            border-bottom: 2.5px dashed #ff9800;
            font-weight: 600;
        }

        .result-item .info {
            display: flex;
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            padding-left: 0;
        }

        .result-item .info span {
            background: linear-gradient(135deg, #fff9c4 0%, #fff59d 100%);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.85em;
            color: #5c3a21;
            border: 2px solid #5c3a21;
            box-shadow: 1.5px 1.5px 0px rgba(92, 58, 33, 0.1);
            font-weight: 500;
        }

        .range-badge {
            display: inline-block;
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            color: #2e7d32;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.85em;
            margin-top: 12px;
            margin-left: 0;
            border: 2px solid #2e7d32;
            box-shadow: 1.5px 1.5px 0px rgba(46, 125, 50, 0.15);
            font-weight: 600;
        }

        .note {
            background: linear-gradient(135deg, #ffe082 0%, #ffd54f 100%);
            border: 2.5px dashed #5c3a21;
            border-radius: 14px;
            padding: 16px;
            margin-top: 20px;
            color: #5c3a21;
            transform: rotate(-1deg);
        }

        .note h4 {
            margin-bottom: 8px;
            font-size: 1em;
            display: inline-block;
            background: #ffca28;
            padding: 4px 10px;
            border-radius: 8px;
            border: 2px solid #5c3a21;
            font-weight: 600;
        }

        .note p {
            margin-bottom: 6px;
            line-height: 1.5;
            font-size: 0.85em;
        }

        .error {
            display: none;
            background: linear-gradient(135deg, #ffab91 0%, #ff8a65 100%);
            border: 2.5px solid #d84315;
            color: #bf360c;
            padding: 12px 16px;
            border-radius: 14px;
            text-align: center;
            font-size: 0.95em;
            box-shadow: 3px 3px 0px rgba(216, 67, 21, 0.15);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .error.show {
            display: block;
            animation: shake 0.35s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            75% { transform: translateX(10px) rotate(2deg); }
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.9em; -webkit-text-stroke: 1.2px #5c3a21; }
            .header p { font-size: 0.85em; padding: 5px 15px; }
            .card { padding: 18px; }
            .result-item { padding: 12px; gap: 12px; }
            .creature-img { width: 65px; height: 65px; max-width: 65px; min-height: 65px; }
            .result-item .name { font-size: 1em; }
            .result-item .info span { font-size: 0.8em; padding: 5px 10px; }
            .btn-predict { font-size: 1em; padding: 12px 18px; }
            .input-group label { font-size: 0.9em; padding: 3px 10px; }
            .input-group input { padding: 10px 14px; font-size: 0.9em; }
            .slider-value { font-size: 0.8em; }
            input[type="range"]::-webkit-slider-thumb { width: 20px; height: 20px; }
            input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; }
        }
    </style>
</head>

        function predict() {
            const weightInput = document.getElementById('weight').value;
            const lengthInput = document.getElementById('length').value;
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');
            const resultHeader = document.getElementById('resultHeader');
            const resultContent = document.getElementById('resultContent');

            // 重置显示
            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');

            // 验证输入
            if (!weightInput || isNaN(parseFloat(weightInput)) || parseFloat(weightInput) < 0) {
                showError('请输入有效的重量数值！');
                return;
            }

            const weight = parseFloat(weightInput);
            const length = lengthInput ? parseFloat(lengthInput) : null;

            // 根据重量和尺寸匹配数据
            let matchedCreatures = eggData.filter(creature => {
                // 重量必须在范围内
                if (weight < creature.weightRange.min || weight > creature.weightRange.max) {
                    return false;
                }
                // 如果输入了长度，长度也必须在范围内
                if (length !== null) {
                    return length >= creature.lengthRange.min && length <= creature.lengthRange.max;
                }
                return true;
            });

            if (matchedCreatures.length === 0) {
                showError('未找到匹配的精灵蛋数据，请检查输入！');
                return;
            }

            // 显示结果
            resultHeader.textContent = `🎉 可能孵化出 ${matchedCreatures.length} 种精灵`;

            resultContent.innerHTML = matchedCreatures.map(creature => {
                const imgUrl = `https://tse2.mm.bing.net/th?q=洛克王国+${encodeURIComponent(creature.name)}+精灵&w=150&h=150&c=7&rs=1&p=0&dpr=1&pid=1.7`;
                return `
                <div class="result-item">
                    <img src="${imgUrl}" alt="${creature.name}" class="creature-img" onerror="this.src='https://via.placeholder.com/150x150?text='+this.alt">
                    <div class="creature-details">
                        <div class="name">${creature.name}</div>
                        <div class="info">
                            <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; transform: rotate(-45deg);"><path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/><path d="m14.5 12.5 2-2"/><path d="m11.5 9.5 2-2"/><path d="m8.5 6.5 2-2"/><path d="m17.5 15.5 2-2"/></svg>尺寸: ${creature.lengthRange.min}-${creature.lengthRange.max}</span>
                            <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4zm0 2a2 2 0 0 1 2 2v2h-4V6a2 2 0 0 1 2-2z"/></svg>重量: ${formatWeightRange(creature.weightRange)}</span>
                        </div>
                    </div>
                </div>
            `}).join('');

            resultDiv.classList.add('show');

            // 滚动到结果区域
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function formatWeightRange(range) {
            return `${range.min}g - ${range.max}g`;
        }

        function checkLengthMatch(inputLength, lengthRange) {
            return inputLength >= lengthRange.min && inputLength <= lengthRange.max;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        // 支持回车键提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                predict();
            }
        });

        // 滑块与输入框同步
        const lengthInput = document.getElementById('length');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const weightInput = document.getElementById('weight');
        const weightSlider = document.getElementById('weightSlider');
        const weightValue = document.getElementById('weightValue');

        // 尺寸滑块事件
        lengthSlider.addEventListener('input', function() {
            const value = parseFloat(this.value);
            lengthInput.value = value;
            lengthValue.textContent = value.toFixed(2);
        });

        lengthInput.addEventListener('input', function() {
            const value = parseFloat(this.value) || 0;
            lengthSlider.value = value;
            lengthValue.textContent = value.toFixed(2);
        });

        // 重量滑块事件
        weightSlider.addEventListener('input', function() {
            const value = parseFloat(this.value);
            weightInput.value = value;
            weightValue.textContent = value.toFixed(3);
        });

        weightInput.addEventListener('input', function() {
            const value = parseFloat(this.value) || 0;
            weightSlider.value = value;
            weightValue.textContent = value.toFixed(3);
        });

        // 初始化滑块值
        lengthSlider.dispatchEvent(new Event('input'));
        weightSlider.dispatchEvent(new Event('input'));
    </script>
